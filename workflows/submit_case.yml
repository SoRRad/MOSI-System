name: MOSI Case Submission

on:
  workflow_dispatch:
    inputs:
      case_payload:
        description: 'JSON-encoded case record'
        required: true
        type: string

jobs:
  save-case:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Append case to data/cases.json
        env:
          NEW_CASE: ${{ github.event.inputs.case_payload }}
        run: |
          mkdir -p data
          [ -f data/cases.json ] || echo "[]" > data/cases.json

          node << 'JS'
          const fs = require('fs');
          const existing = JSON.parse(fs.readFileSync('data/cases.json','utf8'));
          const newCase  = JSON.parse(process.env.NEW_CASE);
          const idx = existing.findIndex(c => c.id === newCase.id);
          if (idx >= 0) { existing[idx] = newCase; } else { existing.push(newCase); }
          fs.writeFileSync('data/cases.json', JSON.stringify(existing, null, 2));
          console.log('Total cases stored: ' + existing.length);
          JS

      - name: Commit and push
        env:
          NEW_CASE: ${{ github.event.inputs.case_payload }}
        run: |
          git config user.name  "MOSI Audit Bot"
          git config user.email "mosi-bot@users.noreply.github.com"
          git add data/cases.json
          CREF=$(node -e "try{console.log(JSON.parse(process.env.NEW_CASE).caseRef||'unknown')}catch(e){console.log('unknown')}")
          git diff --cached --quiet && echo "No new data" && exit 0
          git commit -m "audit: case ${CREF} [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
